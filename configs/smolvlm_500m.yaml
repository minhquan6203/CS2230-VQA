system_prompt: "Dựa trên hình ảnh được cung cấp, hãy trả lời bằng tiếng Việt. Câu trả lời cần ngắn gọn, trực tiếp vào vấn đề mà không cần sử dụng chủ ngữ. Chỉ sử dụng các OCR xuất hiện trong hình ảnh cho câu trả lời."

model:
  name: "HuggingFaceTB/SmolVLM-500M-Instruct"
  type: "smolvlm"
  device: "cuda:0"  # chỉ định GPU: "cuda:0", "cuda:1", ... | null = để HF tự phân bổ

data:
  train_file: "./data/ViTextVQA_train.json"
  dev_file: "./data/ViTextVQA_dev.json"
  test_file: "./data/ViTextVQA_test_gt.json"
  image_dir: "./data/st_images"

training:
  output_dir: "checkpoints/smolvlm_500m"
  num_train_epochs: 3
  per_device_train_batch_size: 2     # SmolVLM nhẹ hơn, có thể tăng batch
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  max_length: 1024
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 2
  report_to: "wandb"
  seed: 42

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"


wandb:
  project: "CS2230-VQA"
  run_name: "smolvlm_500m"

evaluation:
  checkpoint: null
  batch_size: 8     # nhẹ hơn, batch lớn hơn khi inference
  max_new_tokens: 64
  num_beams: 1
  results_file: "results/smolvlm_500m_test.json"
