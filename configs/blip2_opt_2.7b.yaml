system_prompt: "Dựa trên hình ảnh được cung cấp, hãy trả lời bằng tiếng Việt. Câu trả lời cần ngắn gọn, trực tiếp vào vấn đề mà không cần sử dụng chủ ngữ. Chỉ sử dụng các OCR xuất hiện trong hình ảnh cho câu trả lời."

model:
  name: "Salesforce/blip2-opt-2.7b"
  type: "blip2"
  device: null  # null = để HF tự phân bổ (auto)

data:
  train_file: "./data/ViTextVQA_train.json"
  dev_file: "./data/ViTextVQA_dev.json"
  test_file: "./data/ViTextVQA_test_gt.json"
  image_dir: "./data/st_images"

training:
  output_dir: "checkpoints/blip2_opt_2.7b"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  max_length: 512
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 2
  report_to: "none"
  seed: 42

# LoRA target modules cho OPT backbone (attention projection layers)
# Flan-T5 backbone dùng: ["q", "v", "k", "o", "wi_0", "wi_1", "wo"]
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: "none"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

evaluation:
  checkpoint: null
  batch_size: 8
  max_new_tokens: 64
  num_beams: 1
  results_file: "results/blip2_opt_2.7b_test.json"
