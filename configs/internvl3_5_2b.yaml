system_prompt: "Dựa trên hình ảnh được cung cấp, hãy trả lời bằng tiếng Việt. Câu trả lời cần ngắn gọn, trực tiếp vào vấn đề mà không cần sử dụng chủ ngữ. Chỉ sử dụng các OCR xuất hiện trong hình ảnh cho câu trả lời."

model:
  name: "OpenGVLab/InternVL3_5-2B"
  type: "internvl3_5"
  device: "cuda:0"  # chỉ định GPU: "cuda:0", "cuda:1", ... | null = để HF tự phân bổ
  max_num_tiles: 6   # mỗi tile = 256 tokens, max 7 tiles (6+thumbnail) = 1792 image tokens

data:
  train_file: "./data/ViTextVQA_train.json"
  dev_file: "./data/ViTextVQA_dev.json"
  test_file: "./data/ViTextVQA_test_gt.json"
  image_dir: "./data/st_images"

training:
  output_dir: "checkpoints/internvl3_5_2b"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  max_length: 2048
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 2
  report_to: "wandb"
  seed: 42

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # InternVL3.5 dùng Qwen3 LLM backbone → target modules theo naming convention Qwen3
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

wandb:
  project: "CS2230-VQA"
  run_name: "internvl3_5_2b"

evaluation:
  checkpoint: null   # null = base model zero-shot; hoặc "checkpoints/internvl3_5_2b/best_model"
  batch_size: 4
  max_new_tokens: 64
  num_beams: 1
  results_file: "results/internvl3_5_2b_test.json"
